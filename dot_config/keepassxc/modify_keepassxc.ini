#!/usr/bin/env python3
"""
chezmoi modify script for ~/.config/keepassxc/keepassxc.ini

Keys fall into three categories — all must be explicitly listed:

  MANAGED  — chezmoi enforces the value; KeePassXC drift is corrected on apply.
  OMITTED  — chezmoi knows the key exists but intentionally does not manage it
              (device-specific state, secrets, runtime paths). Passed through as-is.
  unknown  — any key not listed in either dict is REMOVED from the output,
              which makes it visible in `chezmoi diff` as a removal. Categorise
              it into MANAGED or OMITTED to make the diff go away.
"""
import re
import sys

# ── Keys chezmoi controls ─────────────────────────────────────────────────────
MANAGED: dict[str, dict[str, str]] = {
    'General': {
        'AutoSaveAfterEveryChange': 'false',
        'AutoSaveOnExit': 'false',
        'ConfigVersion': '2',
        'NumberOfRememberedLastDatabases': '1',
        'RememberLastKeyFiles': 'false',
    },
    'GUI': {
        'ApplicationTheme': 'dark',
        'CompactMode': 'true',
        'TrayIconAppearance': 'monochrome-light',
    },
    'KeeShare': {
        'QuietSuccess': 'true',
    },
    'PasswordGenerator': {
        'AdditionalChars': '',
        'ExcludedChars': '',
        'Length': '28',
        'Type': '1',
        'WordCase': '3',
        'WordCount': '9',
        'WordSeparator': '$',
    },
    'Security': {
        'LockDatabaseIdleSeconds': '30',
        'LockDatabaseMinimize': 'true',
    },
}

# ── Keys chezmoi knows about but intentionally does not manage ────────────────
OMITTED: dict[str, set[str]] = {
    'Browser': {
        'CustomProxyLocation',  # runtime socket path, machine-specific
        'Enabled',              # toggled by user at runtime
    },
    'General': {
        'LastActiveDatabase',   # session state
        'LastOpenedDatabases',  # session state
    },
    'KeeShare': {
        'Active',   # serialised device certificate — secret, machine-specific
        'Own',      # serialised own certificate   — secret, machine-specific
    },
}
# ─────────────────────────────────────────────────────────────────────────────

KNOWN: dict[str, set[str]] = {
    section: (set(MANAGED.get(section, {})) | OMITTED.get(section, set()))
    for section in set(MANAGED) | set(OMITTED)
}

lines = sys.stdin.read().splitlines(keepends=True)

current_section: str | None = None
seen_sections: set[str] = set()
applied: dict[str, set[str]] = {s: set() for s in MANAGED}
out: list[str] = []

for line in lines:
    section_match = re.match(r'^\[(.+)\]\s*$', line)

    if section_match:
        # Before leaving, flush any managed keys absent from the file
        if current_section in MANAGED:
            for key, value in MANAGED[current_section].items():
                if key not in applied[current_section]:
                    out.append(f'{key}={value}\n')
                    applied[current_section].add(key)

        current_section = section_match.group(1)
        seen_sections.add(current_section)
        out.append(line)
        continue

    kv_match = re.match(r'^(\w+)=(.*)', line)
    if kv_match and current_section is not None:
        key = kv_match.group(1)
        section_known = KNOWN.get(current_section, set())

        if current_section in MANAGED and key in MANAGED[current_section]:
            # Enforce managed value
            out.append(f'{key}={MANAGED[current_section][key]}\n')
            applied[current_section].add(key)
            continue

        if key in section_known:
            # Explicitly omitted — pass through unchanged
            out.append(line)
            continue

        # Unknown key — drop it so chezmoi diff surfaces it as a removal.
        # Add it to MANAGED or OMITTED above to make the diff go away.
        continue

    out.append(line)

# Flush missing managed keys for the last section
if current_section in MANAGED:
    for key, value in MANAGED[current_section].items():
        if key not in applied[current_section]:
            out.append(f'{key}={value}\n')

# Append entirely missing managed sections
for section, keys in MANAGED.items():
    if section not in seen_sections:
        out.append(f'\n[{section}]\n')
        for key, value in keys.items():
            out.append(f'{key}={value}\n')

sys.stdout.write(''.join(out))
