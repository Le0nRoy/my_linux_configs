name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          find . -name '*.bash' -o -name '*.sh' \
            | grep -v '\.git' \
            | sort \
            | xargs -I{} bash -n {}

      - name: ShellCheck
        uses: reviewdog/action-shellcheck@853366d6a4afe65985b8f9ba43924a4afc0a45c9  # v1.32.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error
          fail_level: error
          path: "."
          pattern: "*.bash *.sh"

      - name: .gitmodules HTTPS regression check
        run: |
          if grep -E 'url\s*=' .gitmodules | grep -qv 'https://'; then
            echo "ERROR: SSH URL found in .gitmodules"
            exit 1
          fi
          echo "OK: all .gitmodules URLs use HTTPS"

      - name: chezmoi.toml TOML validation
        run: |
          python3 - <<'EOF'
          import tomllib
          with open('dot_config/chezmoi/chezmoi.toml', 'rb') as f:
              tomllib.load(f)
          print('OK: dot_config/chezmoi/chezmoi.toml is valid TOML')
          EOF
